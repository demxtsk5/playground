---
- name: Setup the TFTBOOT server
  become: true
  hosts:
    - tftboot
  tasks:
    - name: Install missing packages
      ansible.builtin.package:
        name: "{{ extra_pkgs }}"
        state: present
      notify:
        - Dnsmasq
        - Nginx
        - Nfs-kernel-server
    - name: Create necessary folders
      ansible.builtin.file:
        path: "{{ needed_folders }}"
        state: directory
        mode: '0777'
    - name: Touch some empty but needed files
      ansible.builtin.file:
        path: "/var/www/html/install/{{ needed_files }}"
        state: touch
        mode: '0644'
    - name: Place config files
      ansible.builtin.template:
        src: dnsmasq.conf.j2
        dest: /etc/dnsmasq.conf
        owner: root
        mode: '0644'
      notify:
        - Dnsmasq
    - name: Export Ubunut image
      ansible.builtin.lineinfile:
        path: /etc/exports
        line: "/nfs/ubuntu *(ro,sync,no_subtree_check,all_squash)"
        state: present

  handlers:
    - name: Dnsmasq
      ansible.builtin.service:
        name: dnsmasq
        state: restarted
        enabled: true
    - name: Nfs-kernel-server
      ansible.builtin.service:
        name: nfs-kernel-server
        state: restarted
        enabled: true
    - name: Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
        enabled: true
